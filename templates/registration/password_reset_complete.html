{% extends "base_stitch.html" %}
{% load i18n %}
{% block title %}{% trans "Contraseña Restablecida" %} - EventPulse{% endblock %}
{% block content %}
<div class="max-w-md w-full mx-auto text-center">
    <div class="bg-surface-container-lowest rounded-xl shadow-sm p-8">
        <span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
        <h2 class="text-2xl font-bold text-on-surface mt-4" data-i18n="success_title">¡Contraseña cambiada!</h2>
        <p class="text-on-surface-variant mt-2" data-i18n="success_message">Tu contraseña se ha restablecido correctamente.</p>
        <a href="{% url 'login' %}" class="mt-6 inline-block btn-gradient-primary text-white py-2 px-6 rounded-xl" data-i18n="login_here">Iniciar sesión ahora</a>
    </div>
</div>
{% endblock %}
