{% extends "base_stitch.html" %}
{% load i18n %}
{% block title %}{% trans "Iniciar Sesión" %} - EventPulse{% endblock %}
{% block content %}
<div class="max-w-[400px] w-full mx-auto space-y-8">
    <div class="text-center space-y-2">
        <h1 class="text-3xl font-bold tracking-tight text-on-surface" data-i18n="login">Bienvenido de nuevo</h1>
    </div>
    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(0,87,206,0.06)] space-y-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="block text-[0.75rem] font-bold uppercase tracking-wider text-on-surface-variant" for="id_username" data-i18n="email">Email</label>
                <input type="email" name="username" id="id_username" class="w-full px-4 py-3 rounded-xl bg-surface-container-lowest border border-outline-variant/20 focus:ring-4 focus:ring-primary-fixed-dim/30 focus:border-primary outline-none transition-all" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="space-y-1.5">
                <div class="flex justify-between">
                    <label class="block text-[0.75rem] font-bold uppercase tracking-wider text-on-surface-variant" for="id_password" data-i18n="password">Contraseña</label>
                    <a href="{% url 'password_reset' %}" class="text-[0.75rem] font-bold text-primary hover:text-primary-container transition-colors" data-i18n="forgot_password">¿Olvidaste?</a>
                </div>
                <input type="password" name="password" id="id_password" class="w-full px-4 py-3 rounded-xl bg-surface-container-lowest border border-outline-variant/20 focus:ring-4 focus:ring-primary-fixed-dim/30 focus:border-primary outline-none transition-all" required>
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="remember_me" id="id_remember_me" class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary">
                <label for="id_remember_me" class="ml-2 block text-sm text-on-surface-variant" data-i18n="remember_me">Recordarme</label>
            </div>
            <button type="submit" class="w-full btn-gradient-primary text-white font-semibold py-3 px-6 rounded-xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <span data-i18n="login">Iniciar Sesión</span>
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
            </button>
        </form>
        <div class="pt-4 text-center border-t border-surface-container-high">
            <p class="text-sm text-on-surface-variant"><span data-i18n="no_account">¿No tienes cuenta?</span> <a href="{% url 'usuarios:registro' %}" class="text-primary font-bold hover:underline" data-i18n="register_here">Regístrate aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
