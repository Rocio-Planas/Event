{% extends "base_stitch.html" %}
{% load i18n %}
{% block title %}{% trans "Recuperar Contraseña" %} - EventPulse{% endblock %}
{% block content %}
<div class="max-w-[400px] w-full mx-auto space-y-8">
    <div class="text-center space-y-2">
        <h1 class="text-3xl font-bold tracking-tight text-on-surface" data-i18n="forgot_password_title">¿Olvidaste tu contraseña?</h1>
        <p class="text-on-surface-variant body-md" data-i18n="forgot_password_subtitle">Te enviaremos un enlace para restablecerla</p>
    </div>
    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(0,87,206,0.06)] space-y-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="block text-[0.75rem] font-bold uppercase tracking-wider text-on-surface-variant" for="id_email" data-i18n="email">Email registrado</label>
                <input type="email" name="email" id="id_email" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-lg focus:ring-4 focus:ring-primary-fixed-dim/30 focus:border-primary outline-none transition-all" placeholder="correo@ejemplo.com" required>
            </div>
            <button type="submit" class="w-full btn-gradient-primary text-white font-semibold py-3 px-6 rounded-lg shadow-sm hover:shadow-md active:scale-[0.98] transition-all" data-i18n="send_instructions">Enviar instrucciones</button>
        </form>
        <div class="text-center">
            <a href="{% url 'usuarios:login' %}" class="text-sm text-primary hover:underline" data-i18n="back_to_login">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
