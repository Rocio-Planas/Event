{% load i18n %}
<input type="{{ widget.type }}" name="{{ widget.name }}"{% if widget.value %} value="{{ widget.value }}"{% endif %}{% include "django/forms/widgets/attrs.html" %}>
{% if widget.help_text %}
    <div class="text-xs text-on-surface-variant mt-1 space-y-0.5">
        {{ widget.help_text|safe }}
    </div>
{% endif %}
