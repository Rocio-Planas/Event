{% extends "base_stitch.html" %}
{% load static %}
{% block title %}{{ titulo }} - EventPulse{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6">
        <h2 class="text-2xl font-bold text-on-surface mb-6">{{ titulo }}</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Columna izquierda -->
                <div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="first_name">Nombre</label>
                        <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="last_name">Apellido</label>
                        <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="email">Correo electrónico</label>
                        <input type="email" name="email" value="{{ form.email.value|default:'' }}" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                    </div>
                </div>
                
                <!-- Columna derecha -->
                <div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="phone">Teléfono</label>
                        <input type="text" name="telefono" value="{{ form.telefono.value|default:'' }}" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="role">Rol</label>
                        <select name="rol" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                            <option value="espectador" {% if form.rol.value == 'espectador' %}selected{% endif %}>Espectador</option>
                            <option value="organizador" {% if form.rol.value == 'organizador' %}selected{% endif %}>Organizador</option>
                            <option value="staff" {% if form.rol.value == 'staff' %}selected{% endif %}>Staff</option>
                            <option value="administrador" {% if form.rol.value == 'administrador' %}selected{% endif %}>Administrador</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-on-surface-variant mb-1" data-i18n="password">Contraseña</label>
                        <input type="password" name="password" class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all">
                        <p class="text-xs text-on-surface-variant mt-1" data-i18n="password_help">Dejar en blanco para generar una automática (12 caracteres)</p>
                    </div>
                </div>
            </div>

            <!-- Activo -->
            <div class="flex items-center gap-3 my-4 p-3 bg-surface-container-high rounded-lg">
                <input type="checkbox" name="is_active" id="id_is_active" {% if form.is_active.value %}checked{% endif %} class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary">
                <label for="id_is_active" class="text-sm font-medium text-on-surface-variant" data-i18n="is_active">Usuario activo</label>
            </div>

            <!-- Botones -->
            <div class="flex justify-end gap-3 pt-4 border-t">
                <a href="{% url 'core:admin_usuarios' %}" class="px-4 py-2 border rounded-lg text-on-surface-variant hover:bg-surface-container-high" data-i18n="cancel">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:opacity-90" data-i18n="save_changes">Guardar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
