<!doctype html>
<html lang="es">
    {% load static %}
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home</title>
        <!-- Bootstrap -->
        <link
            href="{% static 'in_person_events/common/css/bootstrap.min.css' %}"
            rel="stylesheet"
        />
        <!-- Google Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <!-- Custom CSS -->
        <link
            rel="stylesheet"
            href="{% static 'in_person_events/home/css/style.css' %}"
        />
    </head>
    <body>
        <a id="createEventBtn" class="btn-concierge" href="{% url 'in_person_events:create_event_form' %}">
            <span>Crear Evento</span>
            <svg
                class="icon-plus"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
        </button>

        <!-- Bootstrap JS -->
        <script src="{% static 'in_person_events/common/js/bootstrap.bundle.min.js' %}"></script>
        <!-- Custom JS -->
        <script src="{% static 'in_person_events/home/js/main.js' %}"></script>
    </body>
</html>
